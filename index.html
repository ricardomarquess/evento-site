<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Evento</title>
    <link rel="stylesheet" href="assets/styles/style.css">
    <link rel="stylesheet" href="assets/styles/mediaqueries.css">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet"/>
</head> 
<body>
    <div class="main-title">
        <h1>PROMOÇÃO!!!!</h1>
        <h2>50% de desconto!</h2>
    </div>
    <div class="conteiner">
        <div class="preco">
            <div class="sem-promo">
                <h2>de</h2>
                <h1>R$225,99</h1>
            </div>
            <div class="com-promo">
                <h2>por apenas</h2>
                <h1>R$112,99</h1>
                <p>
                    Você garante seu futuro no mundo da tecnologia!<br>
                    Preencha os dados abaixo e receba todas as informações para<br>
                    <strong>SER O NOSSO MAIS NOVO ALUNO</strong>
                </p>
            </div>
        </div>
        <div class="inscrição">
            <form action="" method="post">
                <div class="input-group">
                    <label for="id_email">Seu E-mail</label>
                    <input type="number" name="email" id="id_email" placeholder="Seu E-mail aqui..." required>
                </div>
                <div class="input-group">
                    <label for="id_wpp">Seu numero de Whatsapp</label>
                    <input type="number" name="wpp" id="id_wpp" required>
                </div>
                <div class="input-enviar">
                    <input type="submit" value="INSCREVER-SE">
                </div>
            </form>
        </div>
    </div>
</body>
</html>
